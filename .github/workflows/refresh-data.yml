name: Refresh data (every 6h)

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC.
    # 4×/day strikes a balance:
    #   - Fast-moving feeds (HungerMap, GDACS, ReliefWeb, OpenAQ, NASA FIRMS,
    #     Open-Meteo) refresh meaningfully more often than daily.
    #   - Heavy bulk downloads (FAO FBS ZIP ~21MB, FAO TCL ZIP ~250MB,
    #     World Bank WFSO ~60 API pages) still only hit upstream 4×/day —
    #     polite to FAO's CDN, well under any documented rate limit.
    #   - Most upstream data is monthly/quarterly so the 4 extra daily runs
    #     mostly just re-fetch the same bytes; we keep them anyway so the
    #     "loaded_at" timestamp on the source-health UI stays fresh and any
    #     intra-day spot updates from FAO/WB land within hours.
    # Every-2h was considered but rejected: 12 bulk downloads/day × 250MB
    # of FAOSTAT TCL is wasteful when that file changes ~once a year.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions UI

env:
  # Opt into Node 24 early to silence Node 20 deprecation warnings.
  # GitHub will force this default starting June 2nd, 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run all refresh scripts
        env:
          ACLED_API_KEY: ${{ secrets.ACLED_API_KEY }}
          ACLED_EMAIL: ${{ secrets.ACLED_EMAIL }}
          COMTRADE_API_KEY: ${{ secrets.COMTRADE_API_KEY }}
          RELIEFWEB_APPNAME: ${{ secrets.RELIEFWEB_APPNAME }}
          IPC_API_KEY: ${{ secrets.IPC_API_KEY }}
          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
          NASA_FIRMS_MAP_KEY: ${{ secrets.NASA_FIRMS_MAP_KEY }}
        run: |
          cd scripts
          python run_all.py

      # v20.33 — data integrity validation. Reads every expected output file
      # produced by run_all.py, validates JSON + envelope shape + non-trivial
      # data payload. Critical failures (>= 4) trip non-zero exit, so the
      # workflow status reflects reality instead of always being green.
      # See scripts/validate_data.py for per-file criticality + shape rules.
      - name: Validate data integrity
        run: |
          cd scripts
          python validate_data.py

      - name: Commit refreshed data
        run: |
          git config user.name  "foodshield-bot"
          git config user.email "bot@foodshield.ai"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes today."
          else
            git commit -m "data: daily refresh $(date -u +%Y-%m-%d)"
            # v20.7: handle race condition where origin/main moved during the ~25-min refresh run.
            # Rebase-and-push-with-retry. If rebase fails (conflict in data/*.json against new
            # remote work), we abort cleanly rather than corrupt history; a human re-runs.
            for attempt in 1 2 3; do
              echo "Push attempt $attempt/3"
              git pull --rebase --autostash origin main || {
                echo "Rebase failed on attempt $attempt — aborting and exiting non-zero"
                git rebase --abort 2>/dev/null || true
                exit 1
              }
              if git push origin main; then
                echo "Push succeeded on attempt $attempt"
                exit 0
              fi
              echo "Push race detected — retrying after 10s"
              sleep 10
            done
            echo "All 3 push attempts failed — exiting non-zero"
            exit 1
          fi
