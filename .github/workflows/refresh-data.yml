name: Refresh data (daily)

on:
  schedule:
    # 06:00 UTC every day = 07:00 Amsterdam (CET) / 08:00 CEST
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions UI

env:
  # Opt into Node 24 early to silence Node 20 deprecation warnings.
  # GitHub will force this default starting June 2nd, 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run all refresh scripts
        env:
          ACLED_API_KEY: ${{ secrets.ACLED_API_KEY }}
          ACLED_EMAIL: ${{ secrets.ACLED_EMAIL }}
          COMTRADE_API_KEY: ${{ secrets.COMTRADE_API_KEY }}
          RELIEFWEB_APPNAME: ${{ secrets.RELIEFWEB_APPNAME }}
          IPC_API_KEY: ${{ secrets.IPC_API_KEY }}
          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
          NASA_FIRMS_MAP_KEY: ${{ secrets.NASA_FIRMS_MAP_KEY }}
        run: |
          cd scripts
          python run_all.py

      - name: Commit refreshed data
        run: |
          git config user.name  "foodshield-bot"
          git config user.email "bot@foodshield.ai"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes today."
          else
            git commit -m "data: daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi
